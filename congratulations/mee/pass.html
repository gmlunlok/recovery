<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Account Recovery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* --- SCROLL FIX & BACKGROUND BASE --- */
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden; 
            touch-action: none; 
        }
        
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0c0014; /* Deep premium dark color */
            color: #fff;
            position: relative;
            -webkit-user-select: none; 
            user-select: none;
        }
        
        /* --- PREMIUM DEEP GLOW BACKGROUND ANIMATION --- */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px); 
            opacity: 0.2; 
            z-index: -1; 
            animation: deepGlowBling 12s infinite alternate ease-in-out;
        }

        body::before {
            width: 450px;
            height: 450px;
            background: #ff007f;
            top: -150px;
            left: -100px;
        }

        body::after {
            width: 550px;
            height: 550px;
            background: #a200ff;
            bottom: -200px;
            right: -150px;
            animation-delay: -6s; 
        }

        @keyframes deepGlowBling {
            0% { transform: translate(0, 0) scale(1); opacity: 0.15; }
            50% { opacity: 0.35; transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, 60px) scale(1); opacity: 0.15; }
        }

        /* --- GOOGLE LOGO --- */
        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .logo {
            width: auto;
            max-width: 120px;
            animation: glowLogoBlue 2s infinite alternate;
        }

        .logo img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        @keyframes glowLogoBlue {
            0% { filter: drop-shadow(0 0 5px rgba(66, 103, 178, 0.7)); }
            100% { filter: drop-shadow(0 0 20px rgba(66, 103, 178, 1)); }
        }

        /* --- MAIN CONTAINER --- */
        .container {
            background-color: rgba(20, 20, 20, 0.65);
            backdrop-filter: blur(10px); /* Added slight glass blur to blend with glowing background */
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .item {
            margin-bottom: 30px;
        }

        .item:last-child {
            margin-bottom: 0;
        }

        .title {
            font-size: 14px;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
        }

        .value {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            display: block;
            word-break: break-all;
        }

        .value.password {
            color: #39FF14;
            font-family: monospace;
            letter-spacing: 3px;
        }

        @media (max-width: 600px) {
            .header {
                top: 15px;
                left: 15px;
            }
            .logo {
                max-width: 90px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo">
        </div>
    </div>

    <div class="container">
        <div class="item">
            <span class="title">Recovery Gmail</span>
            <span class="value">dummy_user@gmail.com</span>
        </div>

        <div class="item">
            <span class="title">Password</span>
            <!-- Initially yahan stars (****) rahenge -->
            <span class="value password" id="password-value">********</span>
        </div>
    </div>

    <script>
        // Page load hone ke 1 second (1000 milliseconds) baad actual password show hoga
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('password-value').textContent = '2HHd02@xwwQ';
            }, 1000);
        };
    </script>

</body>
</html>
