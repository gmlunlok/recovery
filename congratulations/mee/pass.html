<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Account Recovery</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #0f172a, #1e293b, #0f172a);
            color: #f1f5f9;
        }

        .container {
            width: 90%;
            max-width: 500px;
        }

        .account-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            margin-bottom: 20px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 4px solid #39FF14; /* Highlighted left border */
        }

        li:last-child {
            margin-bottom: 0;
        }

        /* Highlighted Bullet Point */
        li::before {
            content: '•';
            color: #39FF14;
            font-size: 2.5rem;
            margin-right: 15px;
            line-height: 0.5;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.8);
        }

        .label {
            font-weight: 600;
            color: #cbd5e1;
            margin-right: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1rem;
        }

        .value {
            font-family: monospace;
            font-size: 1.3rem;
            color: #ffffff;
            word-break: break-all;
            margin-left: auto;
        }

        .value.password {
            color: #39FF14;
            letter-spacing: 2px;
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.4);
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            li {
                flex-direction: column;
                align-items: flex-start;
            }
            .value {
                margin-left: 35px;
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="account-card">
            <ul>
                <li>
                    <span class="label">Recovery Gmail:</span>
                    <span class="value" id="gmail-value">dummy_user@gmail.com</span>
                </li>
                <li>
                    <span class="label">Password Key:</span>
                    <span class="value password" id="password-value">********</span>
                </li>
            </ul>
        </div>
    </div>

    <script>
        // 6 digit ka random strong password generate karne ka function
        function generateStrongPassword(length = 6) {
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()';
            let result = '';
            const charactersLength = characters.length;
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * charactersLength));
            }
            return result;
        }

        // Jab bhi page load ya refresh hoga, background me naya password set ho jayega
        window.onload = function() {
            const passwordElement = document.getElementById('password-value');
            if (passwordElement) {
                passwordElement.textContent = generateStrongPassword(6);
            }
        };
    </script>
</body>
</html>
