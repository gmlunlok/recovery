<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account Recovery Details</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           GOOGLE ORIGINAL LIGHT THEME STYLES
           ========================================= */
        body {
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #ffffff;
            padding: 40px 40px;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            margin-bottom: 15px;
        }

        .logo-container img {
            height: 32px; 
        }

        .card h1 {
            font-size: 24px;
            font-weight: 400;
            color: #202124;
            margin: 0 0 10px 0;
        }

        .card p.subtitle {
            font-size: 16px;
            color: #5f6368;
            margin: 0 0 30px 0;
        }

        /* --- DATA CONTAINERS --- */
        .data-group {
            text-align: left;
            margin-bottom: 25px;
            background: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 6px;
            padding: 12px 16px;
            position: relative;
        }

        .label {
            font-size: 12px;
            font-weight: 500;
            color: #5f6368;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .value-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .value {
            font-size: 16px;
            color: #202124;
            font-weight: 500;
            word-break: break-all;
            padding-right: 10px;
        }

        .value.password {
            letter-spacing: 1px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
        }

        /* --- COPY BUTTONS --- */
        .copy-btn {
            background: transparent;
            border: none;
            color: #1a73e8;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background-color 0.2s, color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .copy-btn:hover {
            background-color: rgba(26, 115, 232, 0.1);
        }
        
        .copy-btn:active {
            background-color: rgba(26, 115, 232, 0.2);
        }

        .copy-btn.success {
            color: #188038; /* Google Green for success */
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .card {
                padding: 30px 25px;
                margin: 15px;
                border-radius: 12px; /* Slightly rounder on mobile */
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google">
        </div>
        
        <h1>Recovery Details</h1>
        <p class="subtitle">Your account has been successfully recovered.</p>

        <div class="data-group">
            <div class="label">Recovery Gmail</div>
            <div class="value-container">
                <span class="value" id="gmail-value">sapnasingh7mm@gmail.com</span>
                <button class="copy-btn" onclick="copyText('gmail-value', this)" title="Copy Gmail">
                    <i class="fa-regular fa-copy"></i>
                </button>
            </div>
        </div>

        <div class="data-group">
            <div class="label">Password</div>
            <div class="value-container">
                <span class="value password" id="password-value">********</span>
                <button class="copy-btn" onclick="copyText('password-value', this)" title="Copy Password">
                    <i class="fa-regular fa-copy"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Reveal Password after 1 second
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('password-value').textContent = '2HHd02@xwwQ';
            }, 1000);
        };

        // Copy to Clipboard Function
        function copyText(elementId, btnElement) {
            // Get the text from the span
            const textToCopy = document.getElementById(elementId).textContent;
            
            // Do not copy if it's still showing asterisks
            if (textToCopy === '********') return;

            // Use Clipboard API
            navigator.clipboard.writeText(textToCopy).then(() => {
                // Change icon to Checkmark on success
                const icon = btnElement.querySelector('i');
                icon.className = 'fa-solid fa-check';
                btnElement.classList.add('success');

                // Reset icon back to copy after 2 seconds
                setTimeout(() => {
                    icon.className = 'fa-regular fa-copy';
                    btnElement.classList.remove('success');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
                alert("Failed to copy. Please copy manually.");
            });
        }
    </script>

</body>
</html>
