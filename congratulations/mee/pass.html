<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Account Recovery</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #121212; /* Simple dark background */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .item {
            margin-bottom: 30px;
        }

        .item:last-child {
            margin-bottom: 0;
        }

        .title {
            font-size: 14px;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
        }

        .value {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            display: block;
            word-break: break-all;
        }

        .value.password {
            color: #39FF14; /* Green color for password */
            font-family: monospace;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="item">
            <span class="title">Recovery Gmail</span>
            <span class="value">dummy_user@gmail.com</span>
        </div>

        <div class="item">
            <span class="title">Password</span>
            <span class="value password" id="password-value">********</span>
        </div>
    </div>

    <script>
        // 6 digit ka random strong password generate karne ka function
        function generateStrongPassword(length = 6) {
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()';
            let result = '';
            const charactersLength = characters.length;
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * charactersLength));
            }
            return result;
        }

        // Page load/refresh hone par automatically password change hoga
        window.onload = function() {
            const passwordElement = document.getElementById('password-value');
            if (passwordElement) {
                passwordElement.textContent = generateStrongPassword(6);
            }
        };
    </script>

</body>
</html>
