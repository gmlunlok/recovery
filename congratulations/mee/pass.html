<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Account Recovery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        
        body {
            background-color: #0a0a0a;
            color: #fff;
            background-image: url('https://wallpapercave.com/wp/wp6277399.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .logo {
            width: auto;
            max-width: 120px;
            animation: glowLogoBlue 2s infinite alternate;
        }

        .logo img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        @keyframes glowLogoBlue {
            0% { filter: drop-shadow(0 0 5px rgba(66, 103, 178, 0.7)); }
            100% { filter: drop-shadow(0 0 20px rgba(66, 103, 178, 1)); }
        }

        .container {
            background-color: rgba(20, 20, 20, 0.85);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .item {
            margin-bottom: 30px;
        }

        .item:last-child {
            margin-bottom: 0;
        }

        .title {
            font-size: 14px;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            display: block;
        }

        .value {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            display: block;
            word-break: break-all;
        }

        .value.password {
            color: #39FF14;
            font-family: monospace;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }

        /* Naya button style */
        .btn-change {
            background-color: #4285f4;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
            letter-spacing: 1px;
        }

        .btn-change:hover {
            background-color: #3367d6;
        }

        @media (max-width: 600px) {
            .header {
                top: 15px;
                left: 15px;
            }
            .logo {
                max-width: 90px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo">
        </div>
    </div>

    <div class="container">
        <div class="item">
            <span class="title">Recovery Gmail</span>
            <span class="value">dummy_user@gmail.com</span>
        </div>

        <div class="item">
            <span class="title">Password</span>
            <span class="value password" id="password-value">2HHd02@xwwQ</span>
            <button class="btn-change" onclick="changePassword()">Change Password</button>
        </div>
    </div>

    <script>
        // Password manually change/renew karne ka function
        function changePassword() {
            // User se naya password maangne ke liye prompt
            let newPassword = prompt("Enter new password:", "");
            
            // Agar user ne cancel nahi kiya aur kuch type kiya hai, toh update kar do
            if (newPassword !== null && newPassword.trim() !== "") {
                document.getElementById('password-value').textContent = newPassword;
            }
        }
    </script>

</body>
</html>
